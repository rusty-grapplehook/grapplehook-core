name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Matrix values must be arrays — a bare scalar here fails workflow parsing.
        node: [24]
        os: [ubuntu-latest]
        include:
          # One extra leg each on macOS/Windows since exec/kill logic is
          # platform-sensitive (detached process groups vs taskkill).
          - node: 24
            os: macos-latest
          - node: 24
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run typecheck

      - name: Build (tsup → dist ESM + CJS + d.ts)
        run: pnpm run build

      - name: Verify publish contents
        shell: bash
        run: |
          pnpm pack --pack-destination "$RUNNER_TEMP"
          cd "$RUNNER_TEMP"
          TARBALL=$(ls grapplehook-core-*.tgz)
          echo "Inspecting $TARBALL"
          CONTENTS=$(tar -tf "$TARBALL")
          echo "$CONTENTS"
          for f in dist/index.js dist/index.cjs dist/index.d.ts; do
            if ! grep -q "package/$f" <<< "$CONTENTS"; then
              echo "Missing $f in publish tarball" >&2
              exit 1
            fi
          done
          if grep -E "package/(src/|tsconfig|eslint)" <<< "$CONTENTS"; then
            echo "Unexpected files in publish tarball" >&2
            exit 1
          fi
          echo "pack OK"

      - name: Smoke test (import ESM + require CJS)
        shell: bash
        run: |
          node -e "import('./dist/index.js').then(m => { if (!m.download || !m.getVideoInfo || !m.checkTools) throw new Error('missing ESM exports'); console.log('ESM OK'); })"
          node -e "const m = require('./dist/index.cjs'); if (!m.download || !m.getVideoInfo || !m.checkTools) throw new Error('missing CJS exports'); console.log('CJS OK')"
