name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: 24
        os: [ubuntu-latest]
        include:
          # One extra leg each on macOS/Windows since exec/kill logic is
          # platform-sensitive (detached process groups vs taskkill).
          - node: 24
            os: macos-latest
          - node: 24
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run typecheck

      - name: Build (tsup → dist ESM + CJS + d.ts)
        run: pnpm run build

      - name: Check publish contents
        run: pnpm pack --pack-destination /tmp && node -e "console.log('pack OK')"
